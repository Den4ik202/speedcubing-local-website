{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Участники (добавить/изменить)</h4>
                <a href="/" class="btn btn-light btn-sm">Назад на главную</a>
            </div>
            <div class="card-body">
                <form id="participantForm" autocomplete="off">
                    <div class="mb-3 position-relative">
                        <label for="fio" class="form-label">ФИО Участника</label>
                        <input type="text" class="form-control form-control-lg" id="fio" placeholder="Начните вводить ФИО..." required>
                        <div id="autocomplete-list" class="autocomplete-items"></div>
                    </div>

                    <div class="mb-3">
                        <label for="participant-id" class="form-label">ID Участника (Генерируется автоматически)</label>
                        <input type="text" class="form-control" id="participant-id" readonly placeholder="Новый участник">
                    </div>

                    <div class="mb-3">
                        <label for="dob" class="form-label">Дата рождения (необязательно)</label>
                        <input type="date" class="form-control" id="dob">
                    </div>

                    <div class="mb-3">
                        <label for="other" class="form-label">Прочее (необязательно)</label>
                        <textarea class="form-control" id="other" rows="3" placeholder="Дополнительная информация..."></textarea>
                    </div>

                    <div id="status-message" class="alert d-none mb-3"></div>

                    <div class="d-flex justify-content-between">
                        <button type="button" id="clearBtn" class="btn btn-secondary">Очистить поля</button>
                        <button type="submit" class="btn btn-success px-5">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
